<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You | Women's Day 2026</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: white; pointer-events: none; transition: opacity 1s;
        }
        h1 { font-weight: 200; letter-spacing: 5px; font-size: 18px; margin-bottom: 5px; color: #ffb7c5; }
        p { font-size: 12px; opacity: 0.6; }
        #counter { position: absolute; top: 20px; right: 20px; color: white; font-size: 14px; opacity: 0.5; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="counter">1 / 10</div>
    <div id="ui">
        <h1>HAPPY WOMEN'S DAY</h1>
        <p>Tap to see our memories drift and reform</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // YOUR 10 LINKS (Using direct i.ibb.co links for CORS compatibility)
        const IMAGES = [
            'https://i.ibb.co/tMvdwsXk/1.jpg', 'https://i.ibb.co/1JrFFc6P/2.jpg',
            'https://i.ibb.co/dJDHkBQj/3.jpg', 'https://i.ibb.co/W49Rz9kD/4.jpg',
            'https://i.ibb.co/DfbM6zxB/5.jpg', 'https://i.ibb.co/jvF3jNZR/6.jpg',
            'https://i.ibb.co/RGL0SbZP/7.jpg', 'https://i.ibb.co/tPZqdmnZ/8.jpg',
            'https://i.ibb.co/d4tny9Q9/9.jpg', 'https://i.ibb.co/RTwxx649/10.jpg'
        ];

        let scene, camera, renderer, points;
        let currentImgIndex = 0;
        const particleCount = 15000;
        let positions = new Float32Array(particleCount * 3);
        let colors = new Float32Array(particleCount * 3);
        let targetPositions = new Float32Array(particleCount * 3);
        let targetColors = new Float32Array(particleCount * 3);
        let velocities = new Float32Array(particleCount * 3);
        
        let mouse = new THREE.Vector2(-1000, -1000);
        const tmpVec = new THREE.Vector3();

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 400;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({ size: 2, vertexColors: true, transparent: true, opacity: 0.8 });
            points = new THREE.Points(geo, mat);
            scene.add(points);

            loadNextImage();

            window.addEventListener('mousedown', nextImage);
            window.addEventListener('touchstart', (e) => {
                nextImage();
                updateMouse(e.touches[0].clientX, e.touches[0].clientY);
            });
            window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
            window.addEventListener('touchmove', e => updateMouse(e.touches[0].clientX, e.touches[0].clientY));
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function updateMouse(x, y) {
            mouse.x = (x - window.innerWidth / 2);
            mouse.y = -(y - window.innerHeight / 2);
        }

        function loadNextImage() {
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            loader.load(IMAGES[currentImgIndex], (texture) => {
                const img = texture.image;
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 150; canvas.height = 150; // Downsample for performance
                ctx.drawImage(img, 0, 0, 150, 150);
                const data = ctx.getImageData(0, 0, 150, 150).data;

                for (let i = 0; i < particleCount; i++) {
                    const idx = Math.floor(Math.random() * (150 * 150));
                    const r = data[idx * 4] / 255;
                    const g = data[idx * 4 + 1] / 255;
                    const b = data[idx * 4 + 2] / 255;

                    targetPositions[i*3] = (idx % 150 - 75) * 3;
                    targetPositions[i*3+1] = (Math.floor(idx / 150) - 75) * -3;
                    targetPositions[i*3+2] = 0;

                    targetColors[i*3] = r;
                    targetColors[i*3+1] = g;
                    targetColors[i*3+2] = b;
                }
                document.getElementById('counter').innerText = `${currentImgIndex + 1} / 10`;
            });
        }

        function nextImage() {
            currentImgIndex = (currentImgIndex + 1) % IMAGES.length;
            // Add a "burst" effect to velocities
            for(let i=0; i<particleCount*3; i++) velocities[i] += (Math.random()-0.5)*20;
            loadNextImage();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const pos = points.geometry.attributes.position.array;
            const col = points.geometry.attributes.color.array;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // Physics: Follow mouse repulsion
                tmpVec.set(pos[i3], pos[i3+1], pos[i3+2]);
                let dist = tmpVec.distanceTo(new THREE.Vector3(mouse.x, mouse.y, 0));
                if (dist < 60) {
                    let force = (60 - dist) / 60;
                    velocities[i3] += (pos[i3] - mouse.x) * force * 0.2;
                    velocities[i3+1] += (pos[i3+1] - mouse.y) * force * 0.2;
                }

                // Spring back to target
                velocities[i3] += (targetPositions[i3] - pos[i3]) * 0.05;
                velocities[i3+1] += (targetPositions[i3+1] - pos[i3+1]) * 0.05;
                velocities[i3+2] += (targetPositions[i3+2] - pos[i3+2]) * 0.05;

                // Friction
                velocities[i3] *= 0.85;
                velocities[i3+1] *= 0.85;
                velocities[i3+2] *= 0.85;

                pos[i3] += velocities[i3];
                pos[i3+1] += velocities[i3+1];
                pos[i3+2] += velocities[i3+2];

                // Smooth color transition
                col[i3] += (targetColors[i3] - col[i3]) * 0.1;
                col[i3+1] += (targetColors[i3+1] - col[i3+1]) * 0.1;
                col[i3+2] += (targetColors[i3+2] - col[i3+2]) * 0.1;
            }

            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
